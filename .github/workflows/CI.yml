name: CI Hello World

on:
  pull_request:
    branches:
      - main

jobs:
  hello-world:
    # Filtro para asegurar que la rama de origen (head) sea 'develop'
    if: github.head_ref == 'develop'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        working-directory: ./RIR_API
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ejecutar tests
        working-directory: ./RIR_API
        run: pytest tests/